<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krypto Intel – Markedspuls</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--s:#161b22;--s2:#1c2128;--b:#21262d;--b2:#30363d;--t:#e6edf3;--m:#7d8590;--bull:#3fb950;--bbg:rgba(63,185,80,.12);--bear:#f85149;--rbg:rgba(248,81,73,.12);--warn:#d29922;--wbg:rgba(210,153,34,.12);--blue:#58a6ff;--blbg:rgba(88,166,255,.12);--btc:#F7931A;--eth:#627EEA;--purple:#9945FF}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5}
.topbar{background:var(--s);border-bottom:1px solid var(--b);padding:0 20px;height:50px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200}
.logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}
.logo em{font-style:italic;font-weight:400;color:var(--blue)}
.back-link{font-size:12px;color:var(--blue);text-decoration:none;padding:4px 10px;border:1px solid var(--b2);border-radius:6px;margin-left:8px}
.back-link:hover{background:var(--blbg)}
.upd{font-size:10px;color:var(--m);margin-left:auto}
.nav{background:var(--s);border-bottom:1px solid var(--b);padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nt{background:none;border:none;border-bottom:2px solid transparent;padding:11px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--m);cursor:pointer;white-space:nowrap;transition:all .15s}
.nt:hover{color:var(--t)}.nt.active{color:var(--blue);border-bottom-color:var(--blue)}
.panel{display:none}.panel.active{display:block}
.main{padding:18px 20px;max-width:1600px;margin:0 auto}
.card{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:16px 18px}
.ct{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:10px}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sh-t{font-family:'Playfair Display',serif;font-size:17px;font-weight:700}
.sh-b{font-size:10px;font-family:'DM Mono',monospace;color:var(--m);background:var(--s2);padding:2px 7px;border-radius:4px;border:1px solid var(--b)}
.sh-b.bull{color:var(--bull);background:var(--bbg);border-color:var(--bull)}
.sh-b.bear{color:var(--bear);background:var(--rbg);border-color:var(--bear)}
.sh-b.warn{color:var(--warn);background:var(--wbg);border-color:var(--warn)}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.loading{padding:40px;text-align:center;color:var(--m);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--b);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.up{color:var(--bull)}.dn{color:var(--bear)}

/* MOOD BANNER */
.mood-banner{border-radius:10px;padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.mood-emoji{font-size:40px;flex-shrink:0}
.mood-title{font-size:20px;font-weight:700;margin-bottom:3px}
.mood-sub{font-size:13px;opacity:.85;line-height:1.5}
.mood-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.mbadge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid}

/* SIGNAL CARDS (3-grid on overview) */
.sig-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.sig-card{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px 16px}
.sig-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:6px}
.sig-val{font-size:22px;font-weight:700;margin-bottom:4px}
.sig-desc{font-size:12px;color:var(--m);line-height:1.4}

/* PRICE CARDS */
.pcg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.pc{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px 16px}
.pc-ticker{font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:var(--m);margin-bottom:3px}
.pc-name{font-size:12px;font-weight:600;margin-bottom:6px}
.pc-price{font-family:'DM Mono',monospace;font-size:17px;font-weight:600;margin-bottom:6px}
.pc-today{font-size:13px;font-weight:600;margin-bottom:4px}
.pc-sub{font-size:11px;color:var(--m)}

/* DOMINANCE */
.dom-bar{height:14px;background:var(--b2);border-radius:7px;overflow:hidden;display:flex;margin:10px 0 6px}
.dom-seg{height:100%}
.dom-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--m)}
.dom-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

/* FEAR & GREED */
.fg-num{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;line-height:1}
.fg-bar{width:100%;height:10px;border-radius:5px;background:linear-gradient(to right,#f85149 0%,#d29922 40%,#3fb950 100%);margin:12px 0 5px;position:relative}
.fg-needle{position:absolute;top:-5px;width:4px;height:20px;background:var(--t);border-radius:2px;transform:translateX(-50%)}
.fg-hist{display:flex;gap:4px;align-items:flex-end;height:32px;margin-top:10px}
.fg-b{border-radius:2px 2px 0 0;min-height:4px;width:16px}

/* EXPLANATION BOX */
.explain{background:var(--s2);border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:10px 14px;font-size:12px;color:var(--m);line-height:1.6;margin-top:10px}
.explain strong{color:var(--t)}

/* INSIGHT CARDS (correlations) */
.insight-card{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:14px}
.insight-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.insight-title{font-size:13px;font-weight:600;margin-bottom:4px}
.insight-body{font-size:12px;color:var(--m);line-height:1.5}
.insight-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;border:1px solid;margin-top:6px}

/* COT SIMPLIFIED */
.cot-verdict{border-radius:10px;padding:20px;text-align:center;margin-bottom:16px}
.cot-verdict-emoji{font-size:44px;margin-bottom:8px}
.cot-verdict-title{font-size:20px;font-weight:700;margin-bottom:6px}
.cot-verdict-sub{font-size:13px;opacity:.85}
.cbt{height:10px;background:var(--b2);border-radius:5px;overflow:hidden;margin:6px 0}
.cbf{height:100%;border-radius:5px}

/* NEWS */
.news-item{padding:12px 0;border-bottom:1px solid var(--b);display:flex;flex-direction:column;gap:4px}
.news-item:last-child{border-bottom:none}
.news-title a{color:var(--t);text-decoration:none;font-size:13px;font-weight:500;line-height:1.4}
.news-title a:hover{color:var(--blue)}
.news-meta{font-size:11px;color:var(--m);display:flex;gap:8px;flex-wrap:wrap}
.news-cat{font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;background:var(--blbg);color:var(--blue)}

@media(max-width:900px){.g3,.sig-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g3,.g2,.sig-grid{grid-template-columns:1fr}.pcg{grid-template-columns:1fr 1fr}.mood-emoji{font-size:30px}.fg-num{font-size:40px}}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo">Markeds<em>puls</em></div>
  <a href="index.html" class="back-link">← Tilbake</a>
  <div class="upd" id="upd">-</div>
</header>
<nav class="nav">
  <button class="nt active" data-tab="marked">💡 Markedsbildet</button>
  <button class="nt" data-tab="korr">🔍 Signaler</button>
  <button class="nt" data-tab="cot">🏦 Store investorer</button>
  <button class="nt" data-tab="nyheter">📰 Nyheter</button>
</nav>
<div class="main">

  <!-- MARKEDSBILDET -->
  <div class="panel active" id="panel-marked">
    <div id="moodBanner"><div class="loading"><div class="spinner"></div>Laster...</div></div>
    <div class="sig-grid" id="sigGrid"></div>
    <div class="ct" style="margin-bottom:8px">Priser akkurat nå</div>
    <div class="pcg" id="priceGrid"><div class="loading"><div class="spinner"></div>Laster...</div></div>
    <div class="g2">
      <div class="card">
        <div class="ct">Hvem er størst?</div>
        <div id="domBar"></div>
      </div>
      <div class="card">
        <div class="ct">Stemningsindeks (0–100)</div>
        <div id="fgWrap"></div>
      </div>
    </div>
  </div>

  <!-- SIGNALER -->
  <div class="panel" id="panel-korr">
    <div class="sh"><div class="sh-t">Signaler & Sammenhenger</div></div>
    <div id="corrGrid"><div class="loading"><div class="spinner"></div>Laster...</div></div>
  </div>

  <!-- STORE INVESTORER -->
  <div class="panel" id="panel-cot">
    <div class="sh"><div class="sh-t">Hva gjør de store investorene?</div><div class="sh-b" id="cotDate">-</div></div>
    <div id="cotGrid"><div class="loading"><div class="spinner"></div>Laster...</div></div>
  </div>

  <!-- NYHETER -->
  <div class="panel" id="panel-nyheter">
    <div class="sh"><div class="sh-t">Krypto-nyheter</div><div class="sh-b" id="newsDate">-</div></div>
    <div id="newsGrid"><div class="loading"><div class="spinner"></div>Laster...</div></div>
  </div>

</div>
<footer style="border-top:1px solid var(--b);padding:12px 20px;font-size:11px;color:var(--m);display:flex;gap:16px;flex-wrap:wrap;margin-top:28px">
  <span>Priser: Yahoo Finance · CoinGecko · alternative.me · CFTC</span>
  <span>Data: <a href="data/crypto/latest.json" style="color:var(--blue);text-decoration:none">data/crypto/latest.json</a></span>
</footer>

<script>
document.querySelectorAll('.nt').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.nt').forEach(function(x){x.classList.remove('active');});
    document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');
    document.getElementById('panel-'+b.dataset.tab).classList.add('active');
  });
});

function fp(n){return(n>0?'+':'')+n.toFixed(2)+'%';}
function fm(n){if(!n&&n!==0)return'-';var a=Math.abs(n);if(a>=1e12)return(n/1e12).toFixed(2)+'T';if(a>=1e9)return(n/1e9).toFixed(1)+'B';if(a>=1e6)return(n/1e6).toFixed(1)+'M';return String(Math.round(n));}
function cc(n){return n>0?'bull':n<0?'bear':'neutral';}

function fmtPrice(v){
  if(!v&&v!==0)return'-';
  if(v>=1000)return v.toLocaleString('no-NO',{maximumFractionDigits:0});
  if(v>=1)return v.toFixed(4);
  if(v>=0.01)return v.toFixed(5);
  return v.toFixed(8);
}

function sparkline(hist,w,h){
  if(!hist||hist.length<2)return'';
  var min=Math.min.apply(null,hist),max=Math.max.apply(null,hist),rng=max-min||1;
  w=w||50;h=h||18;
  var step=w/(hist.length-1);
  var pts=hist.map(function(v,i){return(i*step).toFixed(1)+','+(h-((v-min)/rng)*h*0.8-1).toFixed(1);}).join(' ');
  var col=hist[hist.length-1]>=hist[hist.length-2]?'var(--bull)':'var(--bear)';
  return'<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" style="display:inline-block;vertical-align:middle;margin-left:6px"><polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}

// ── Hjelpefunksjoner ─────────────────────────────────────────────
function fgInfo(s){
  if(s<=25) return{emoji:'😨',txt:'Ekstrem frykt',sub:'Mange investorer er redde og selger. Historisk sett kan dette være et kjøpssignal.',col:'var(--bear)',bg:'var(--rbg)'};
  if(s<=45) return{emoji:'😟',txt:'Frykt',sub:'Markedet er nervøst. Investorer er forsiktige og nølende.',col:'#d29922',bg:'var(--wbg)'};
  if(s<=55) return{emoji:'😐',txt:'Nøytral',sub:'Ingen klar retning. Markedet venter på neste signal.',col:'var(--m)',bg:'var(--s2)'};
  if(s<=75) return{emoji:'😊',txt:'Grådighet',sub:'Investorer er optimistiske og kjøper aktivt. Kan varsel om korreksjoner.',col:'var(--bull)',bg:'var(--bbg)'};
  return      {emoji:'🤑',txt:'Ekstrem grådighet',sub:'Markedet er overopphetet. Historisk sett øker risikoen for nedgang.',col:'var(--bull)',bg:'var(--bbg)'};
}
function domInfo(btcD){
  if(btcD>60) return{txt:'Bitcoin dominerer totalt',sub:'Altcoins (andre kryptoer) er svake nå.',badge:'BTC DOMINERER'};
  if(btcD>50) return{txt:'Bitcoin er ledende',sub:'Altcoins henger etter, men noe aktivitet der.',badge:'BTC FORAN'};
  if(btcD>40) return{txt:'Balansert marked',sub:'Både Bitcoin og altcoins er aktive.',badge:'BALANSERT'};
  return       {txt:'Altseason mulig',sub:'Andre kryptoer overgår Bitcoin nå.',badge:'ALTSEASON'};
}
function moodInfo(fgScore, btcChg1d){
  if(fgScore>=60 && btcChg1d>0)  return{emoji:'🟢',txt:'Optimistisk',sub:'Markedet er positivt. Investorer kjøper.',col:'var(--bull)',bg:'rgba(63,185,80,.15)',border:'var(--bull)'};
  if(fgScore<=30 || btcChg1d<-3) return{emoji:'🔴',txt:'Nervøst / Redd',sub:'Markedet er usikkert. Investorer selger eller venter.',col:'var(--bear)',bg:'var(--rbg)',border:'var(--bear)'};
  return {emoji:'🟡',txt:'Usikkert',sub:'Ingen klar retning akkurat nå. Markedet avventer.',col:'var(--warn)',bg:'var(--wbg)',border:'var(--warn)'};
}
function cotInfo(pct){
  if(pct>15)  return{emoji:'🐂',txt:'Kjøper aktivt',col:'var(--bull)',bg:'var(--bbg)',sub:'De store investorene har satset tungt på at prisen går OPP.'};
  if(pct>5)   return{emoji:'📈',txt:'Forsiktig positive',col:'var(--bull)',bg:'var(--bbg)',sub:'De store investorene lener seg svakt mot oppgang.'};
  if(pct>-5)  return{emoji:'➡️',txt:'Nøytrale',col:'var(--m)',bg:'var(--s2)',sub:'De store investorene har ikke tatt en tydelig side.'};
  if(pct>-15) return{emoji:'📉',txt:'Forsiktig negative',col:'var(--bear)',bg:'var(--rbg)',sub:'De store investorene lener seg svakt mot nedgang.'};
  return       {emoji:'🐻',txt:'Selger / shorter',col:'var(--bear)',bg:'var(--rbg)',sub:'De store investorene satser aktivt på at prisen går NED.'};
}
function corrText(v){
  if(v===null||v===undefined) return'Ingen data';
  var a=Math.abs(v);
  if(a<0.2) return'Nesten ingen sammenheng';
  if(a<0.4) return(v>0?'Svak positiv':'Svak negativ')+' sammenheng';
  if(a<0.7) return(v>0?'Moderat positiv':'Moderat negativ')+' sammenheng';
  return(v>0?'Sterk positiv':'Sterk negativ')+' sammenheng';
}

function renderAll(d){
  document.getElementById('upd').textContent='Oppdatert: '+d.updated;
  document.getElementById('newsDate').textContent=d.updated||'-';
  document.getElementById('cotDate').textContent='Data per '+(d.cot_btc&&d.cot_btc.date||'-');

  var mkt=d.market||{}, fg=d.fear_greed||{}, prices=d.prices||{};
  var fgScore=fg.score||0, btc=prices.BTC||{};
  var btcChg1d=btc.chg1d||0;
  var COLORS={BTC:'#F7931A',ETH:'#627EEA',SOL:'#9945FF',XRP:'#346AA9',BNB:'#F3BA2F',ADA:'#0033AD',DOGE:'#C2A633',AVAX:'#E84142'};

  // ── Mood-banner ──
  var mood=moodInfo(fgScore,btcChg1d);
  document.getElementById('moodBanner').innerHTML=
    '<div class="mood-banner" style="background:'+mood.bg+';border:1px solid '+mood.border+'">'+
    '<div class="mood-emoji">'+mood.emoji+'</div>'+
    '<div><div class="mood-title" style="color:'+mood.col+'">Kryptomarkedet er: '+mood.txt+'</div>'+
    '<div class="mood-sub">'+mood.sub+'</div></div></div>';

  // ── 3 signalkort ──
  var mcap=mkt.total_mcap, mcapChg=mkt.total_mcap_chg24h||0;
  var fgi=fgInfo(fgScore), domi=domInfo(mkt.btc_dominance||0);
  document.getElementById('sigGrid').innerHTML=
    '<div class="sig-card">'+
      '<div class="sig-label">Samlet markedsverdi</div>'+
      '<div class="sig-val '+(mcapChg>=0?'up':'dn')+'">'+(mcap?'$'+fm(mcap):'-')+'</div>'+
      '<div class="sig-desc">'+(mcapChg>=0?'Opp':'Ned')+' '+Math.abs(mcapChg).toFixed(1)+'% i dag &nbsp;·&nbsp; Totalt alle kryptovalutaer</div>'+
    '</div>'+
    '<div class="sig-card">'+
      '<div class="sig-label">Bitcoin sin markedsandel</div>'+
      '<div class="sig-val" style="color:var(--btc)">'+(mkt.btc_dominance||'-')+'%</div>'+
      '<div class="sig-desc">'+domi.txt+'. '+domi.sub+'</div>'+
    '</div>'+
    '<div class="sig-card">'+
      '<div class="sig-label">Markedsstemning</div>'+
      '<div class="sig-val" style="color:'+fgi.col+'">'+fgi.emoji+' '+fgi.txt+'</div>'+
      '<div class="sig-desc">Stemningsindeks: '+fgScore+'/100. '+fgi.sub+'</div>'+
    '</div>';

  // ── Priskort ──
  var ph='';
  ['BTC','ETH','SOL','XRP','BNB','ADA','DOGE','AVAX'].forEach(function(k){
    var v=prices[k]; if(!v)return;
    var c1=v.chg1d||0, c7=v.chg7d||0;
    var col=COLORS[k]||'var(--blue)';
    var arrow=c1>0?'▲':'▼', arCol=c1>=0?'var(--bull)':'var(--bear)';
    ph+='<div class="pc" style="border-top:3px solid '+col+'">'+
      '<div class="pc-ticker">'+k+'</div>'+
      '<div class="pc-name">'+v.name+'</div>'+
      '<div class="pc-price">$'+fmtPrice(v.price)+'</div>'+
      '<div class="pc-today" style="color:'+arCol+'">'+arrow+' '+(c1>=0?'+':'')+c1.toFixed(2)+'% i dag</div>'+
      '<div class="pc-sub">'+(c7>=0?'▲':'▼')+' '+(c7>=0?'+':'')+c7.toFixed(1)+'% siste 7 dager</div>'+
    '</div>';
  });
  document.getElementById('priceGrid').innerHTML=ph||'<div class="loading">Ingen prisdata</div>';

  // ── Dominans-bar ──
  var btcD=mkt.btc_dominance||0, ethD=mkt.eth_dominance||0, otherD=Math.max(0,100-btcD-ethD);
  var dinfo=domInfo(btcD);
  document.getElementById('domBar').innerHTML=
    '<div class="dom-bar">'+
      '<div class="dom-seg" style="width:'+btcD+'%;background:#F7931A"></div>'+
      '<div class="dom-seg" style="width:'+ethD+'%;background:#627EEA"></div>'+
      '<div class="dom-seg" style="width:'+otherD+'%;background:var(--b2)"></div>'+
    '</div>'+
    '<div class="dom-legend">'+
      '<span><span class="dom-dot" style="background:#F7931A"></span>Bitcoin '+btcD+'%</span>'+
      '<span><span class="dom-dot" style="background:#627EEA"></span>Ethereum '+ethD+'%</span>'+
      '<span><span class="dom-dot" style="background:var(--b2)"></span>Andre '+otherD.toFixed(1)+'%</span>'+
    '</div>'+
    '<div class="explain"><strong>Hva betyr dette?</strong> '+dinfo.txt+'. '+dinfo.sub+
    (btcD>50?' Over 50% betyr Bitcoin «leder an» og andre kryptoer henger etter.':' Under 50% kan bety at andre kryptoer tar over – kalt «altseason».')+
    '</div>';

  // ── Fear & Greed ──
  var fgi2=fgInfo(fgScore), hist=fg.history||[];
  var fgH=
    '<div style="text-align:center;padding:6px 0">'+
    '<div style="font-size:36px;margin-bottom:4px">'+fgi2.emoji+'</div>'+
    '<div class="fg-num" style="color:'+fgi2.col+'">'+fgScore+'</div>'+
    '<div style="font-size:14px;font-weight:600;color:'+fgi2.col+';margin-top:4px">'+fgi2.txt+'</div>'+
    '</div>'+
    '<div class="fg-bar"><div class="fg-needle" style="left:'+fgScore+'%"></div></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--m);margin-bottom:8px"><span>😨 Frykt</span><span>➡️ Nøytral</span><span>🤑 Grådighet</span></div>';
  if(hist.length){
    fgH+='<div class="fg-hist">';
    hist.forEach(function(v){
      fgH+='<div class="fg-b" style="height:'+Math.max(4,Math.round(v/100*32))+'px;background:'+(v<=25?'var(--bear)':v<=50?'var(--warn)':'var(--bull)')+'"></div>';
    });
    fgH+='</div><div style="font-size:10px;color:var(--m);margin-top:3px">Siste 7 dager</div>';
  }
  fgH+='<div class="explain"><strong>Hva betyr dette?</strong> '+fgi2.sub+'</div>';
  document.getElementById('fgWrap').innerHTML=fgH;

  // ── KORRELASJONER ──
  var corr=d.correlations||{};
  var corrRows=[
    ['BTC vs S&P 500','btc_spx','Høy = krypto følger risikoappetitten (risk-on/off)'],
    ['BTC vs Gull','btc_gold','Positiv = begge safe-haven. Negativ = konkurrenter.'],
    ['ETH vs BTC','eth_btc','Over 0.85 = ingen altseason. Under 0.7 = ETH outperformer.'],
    ['SOL vs BTC','sol_btc','Høy beta = SOL beveger seg mer enn BTC i begge retninger.'],
    ['XRP vs BTC','xrp_btc','Lav = XRP drives mer av regulering enn markedssyklus.'],
  ];
  var ch='<table class="corr-table"><thead><tr><th>Par</th><th>Korrelasjon (30d)</th><th>Tolkning</th></tr></thead><tbody>';
  corrRows.forEach(function(row){
    var v=corr[row[1]];
    var f=v!==null&&v!==undefined?v.toFixed(2):'–';
    ch+='<tr><td><strong>'+row[0]+'</strong></td>'+
      '<td><span class="corr-val" style="'+corrColor(v)+'">'+f+'</span>'+
      (v!==null&&v!==undefined?'<div class="corr-desc">'+corrLabel(v)+'</div>':'')+'</td>'+
      '<td style="font-size:12px;color:var(--m)">'+row[2]+'</td></tr>';
  });
  ch+='</tbody></table>';
  document.getElementById('corrGrid').innerHTML=ch;

  // ── COT ──
  var cot=d.cot_btc||{};
  var cotDate=cot.date||'-';
  document.getElementById('cotDate').textContent='CFTC per '+cotDate;
  if(!cot.net&&cot.net!==0){
    document.getElementById('cotGrid').innerHTML='<div class="loading">Ingen COT-data</div>';
  } else {
    var net=cot.net||0,oi=cot.oi||1,chg=cot.chg||0,pct=cot.pct||0;
    var barPct=Math.min(100,Math.max(0,50+pct*3));
    var netCol=net>0?'bull':'bear';
    var chgCol=chg>0?'bull':'bear';
    var cotH=
      '<div class="g3">'+
        '<div class="card"><div class="ct">Spekulanter netto</div><div class="snum '+netCol+'" style="font-size:22px">'+(net>0?'+':'')+fm(net)+'</div><div class="slabel">kontrakter</div></div>'+
        '<div class="card"><div class="ct">Ukeendring</div><div class="snum '+chgCol+'" style="font-size:22px">'+(chg>0?'+':'')+fm(chg)+'</div><div class="slabel">'+(chg>0?'Øker long':'Reduserer/snur')+'</div></div>'+
        '<div class="card"><div class="ct">% av Open Interest</div><div class="snum '+netCol+'" style="font-size:22px">'+(pct>0?'+':'')+pct+'%</div><div class="slabel">OI: '+fm(oi)+' kontrakter</div></div>'+
      '</div>'+
      '<div class="card">'+
        '<div class="ct">Posisjonering</div>'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">'+
          '<span style="color:var(--bear)">SHORT</span>'+
          '<span style="color:var(--m);font-size:11px">Netto '+pct+'% av OI</span>'+
          '<span style="color:var(--bull)">LONG</span>'+
        '</div>'+
        '<div class="cbt"><div class="cbf" style="width:'+barPct+'%;background:'+(net>0?'var(--bull)':'var(--bear)')+'"></div></div>'+
        (cot.history&&cot.history.length>1?'<div style="margin-top:12px"><div class="ct">8-ukers utvikling</div>'+sparkline(cot.history,300,40)+'</div>':'')+
      '</div>'+
      '<div style="margin-top:12px;font-size:12px;color:var(--m);background:var(--s);border:1px solid var(--b);border-radius:8px;padding:14px">'+
        '<strong>Tolkning:</strong> CME Bitcoin-futures er institusjonelle kontrakter (hedge funds, asset managers). '+
        'Netto-long &gt;15% av OI = sterk institusjonell etterspørsel. '+
        'Netto-short = institusjonene er skeptiske eller hedger eksponering.'+
      '</div>';
    document.getElementById('cotGrid').innerHTML=cotH;
  }

  // ── NYHETER ──
  var news=d.news||[];
  if(!news.length){
    document.getElementById('newsGrid').innerHTML='<div class="loading">Ingen nyheter tilgjengelig</div>';
  } else {
    var nh='';
    news.forEach(function(n){
      nh+='<div class="news-item">'+
        '<div class="news-meta">'+
          '<span class="news-cat">'+n.cat+'</span>'+
          '<span>'+n.source+'</span>'+
          '<span>'+n.time+'</span>'+
        '</div>'+
        '<div class="news-title"><a href="'+n.url+'" target="_blank" rel="noopener">'+n.title+'</a></div>'+
      '</div>';
    });
    document.getElementById('newsGrid').innerHTML='<div class="card">'+nh+'</div>';
  }
}

fetch('data/crypto/latest.json')
  .then(function(r){return r.json();})
  .then(renderAll)
  .catch(function(e){
    document.getElementById('priceGrid').innerHTML='<div class="loading">Ingen krypto-data — kjør fetch_crypto.py</div>';
    console.error(e);
  });
</script>
</body>
</html>
