<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COT Data Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c0f;--surface:#111418;--border:#1e2530;--text:#c8d4e0;--muted:#4a5a6a;--accent:#00e5a0;--accent2:#f0a500;--red:#ff4560;--green:#00e5a0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh}
header{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent)}
.logo span{color:var(--muted)}
.meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);border-left:1px solid var(--border);padding-left:20px;line-height:1.7}
.meta strong{color:var(--accent2)}
.sw{margin-left:auto;position:relative}
#search{background:var(--bg);border:1px solid #2a3545;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:8px 14px 8px 36px;border-radius:4px;width:260px;outline:none}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted)}
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-right:4px}
.chip{background:transparent;border:1px solid #2a3545;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 12px;border-radius:2px;cursor:pointer;transition:all .15s}
.chip:hover,.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,160,.05)}
.main{padding:24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.sc{background:var(--surface);border:1px solid var(--border);padding:16px 18px;border-radius:3px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:.4}
.sc.warn::before{background:var(--accent2)}
.sc.danger::before{background:var(--red)}
.sl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.sv{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600}
.ss{font-size:11px;color:var(--muted);margin-top:4px}
.tw{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.th{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.tt{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
.badge{background:rgba(0,229,160,.1);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 8px;border-radius:2px}
table{width:100%;border-collapse:collapse}
thead th{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.02)}
td{padding:11px 16px;font-family:'IBM Plex Mono',monospace;font-size:12px;white-space:nowrap}
.tn{text-align:right}
.pos{color:var(--green)}
.neg{color:var(--red)}
.dp{display:none;background:var(--bg);border-top:1px solid var(--border);padding:20px}
.dp.open{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.dp h4{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.dr{display:flex;justify-content:space-between;padding:4px 0;font-family:'IBM Plex Mono',monospace;font-size:11px}
.dk{color:var(--muted)}
.loading{padding:60px;text-align:center;font-family:'IBM Plex Mono',monospace;color:var(--muted)}
footer{border-top:1px solid var(--border);padding:16px 24px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);display:flex;gap:24px}
footer a{color:var(--accent);text-decoration:none}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}.dp.open{grid-template-columns:1fr}#search{width:160px}}
</style>
</head>
<body>
<header>
  <div class="logo">COT<span>/</span>EXPLORER</div>
  <div class="meta">CFTC · Commitments of Traders<br>Sist oppdatert: <strong id="dato">laster...</strong></div>
  <div class="sw"><span class="si">⌕</span><input type="text" id="search" placeholder="Søk marked, symbol..."></div>
</header>
<div class="filters">
  <span class="fl">Filter</span>
  <button class="chip active" data-f="all">Alle</button>
  <button class="chip" data-f="lev_bull">Lev. Long</button>
  <button class="chip" data-f="lev_bear">Lev. Short</button>
  <button class="chip" data-f="am_bull">Asset Mgr Long</button>
  <button class="chip" data-f="am_bear">Asset Mgr Short</button>
</div>
<div class="main">
  <div class="stats" id="stats"></div>
  <div class="tw">
    <div class="th">
      <span class="tt">Markedsposisjoner</span>
      <span class="badge" id="badge">–</span>
    </div>
    <div id="msg" class="loading">⏳ Laster COT-data...</div>
    <table id="tbl" style="display:none">
      <thead><tr>
        <th>Marked</th><th>Symbol</th>
        <th class="tn">Lev. Funds Netto</th>
        <th class="tn">Asset Mgr Netto</th>
        <th class="tn">Open Interest</th>
        <th class="tn">Uke Δ OI</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<footer>
  <span>Kilde: <a href="https://cftc.gov" target="_blank">CFTC.gov</a></span>
  <span>Oppdateres hver fredag</span>
  <span>AI-data: <a href="data/latest.json">data/latest.json</a></span>
</footer>
<script>
let DATA=[], filter='all', q='';

function fmt(n){
  if(n==null||n===undefined)return'–';
  const a=Math.abs(n);
  if(a>=1e6)return(n/1e6).toFixed(2)+'M';
  if(a>=1e3)return(n/1e3).toFixed(1)+'K';
  return n.toString();
}
function cc(n){return n>=0?'pos':'neg';}
function s(n){return n>=0?'+':'';}

function vis(){
  return DATA.filter(d=>{
    const lev=d.leveraged_funds||{};
    const am=d.asset_managers||{};
    if(filter==='lev_bull'&&(lev.net||0)<=0)return false;
    if(filter==='lev_bear'&&(lev.net||0)>=0)return false;
    if(filter==='am_bull'&&(am.net||0)<=0)return false;
    if(filter==='am_bear'&&(am.net||0)>=0)return false;
    return !q||d.market.toLowerCase().includes(q)||(d.symbol||'').toLowerCase().includes(q);
  });
}

function render(){
  const data=vis();
  document.getElementById('badge').textContent=data.length+' markeder';

  const oi=data.reduce((a,d)=>a+(d.open_interest||0),0);
  const lb=data.filter(d=>(d.leveraged_funds||{}).net>0).length;
  const ab=data.filter(d=>(d.asset_managers||{}).net>0).length;
  const bm=data.length?data.reduce((a,d)=>Math.abs(d.change_lev_net||0)>Math.abs(a.change_lev_net||0)?d:a,data[0]):null;

  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="sl">Total Open Interest</div><div class="sv">${fmt(oi)}</div><div class="ss">${data.length} markeder</div></div>
    <div class="sc"><div class="sl">Lev. Funds Bullish</div><div class="sv pos">${lb}/${data.length}</div><div class="ss">Netto long</div></div>
    <div class="sc warn"><div class="sl">Asset Mgr Bullish</div><div class="sv">${ab}/${data.length}</div><div class="ss">Netto long</div></div>
    <div class="sc ${bm&&(bm.change_lev_net||0)<0?'danger':''}"><div class="sl">Største Δ</div><div class="sv ${bm?cc(bm.change_lev_net||0):''}">${bm?s(bm.change_lev_net||0)+fmt(bm.change_lev_net||0):'–'}</div><div class="ss">${bm?bm.market:''}</div></div>`;

  document.getElementById('tbody').innerHTML=data.map((d,i)=>{
    const lev=d.leveraged_funds||{};
    const am=d.asset_managers||{};
    const dl=d.dealers||{};
    const nr=d.non_reportable||{};
    return`<tr onclick="tog(${i})">
      <td style="color:var(--text);font-weight:500">${d.market}</td>
      <td><span style="font-size:10px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:2px">${d.symbol||'–'}</span></td>
      <td class="tn ${cc(lev.net||0)}">${s(lev.net||0)}${fmt(lev.net||0)}</td>
      <td class="tn ${cc(am.net||0)}">${s(am.net||0)}${fmt(am.net||0)}</td>
      <td class="tn">${fmt(d.open_interest||0)}</td>
      <td class="tn ${cc(d.change_oi||0)}">${s(d.change_oi||0)}${fmt(d.change_oi||0)}</td>
    </tr>
    <tr id="d${i}" style="display:none"><td colspan="6" style="padding:0">
      <div class="dp open">
        <div><h4>Leveraged Funds</h4>
          <div class="dr"><span class="dk">Long</span><span>${fmt(lev.long)}</span></div>
          <div class="dr"><span class="dk">Short</span><span>${fmt(lev.short)}</span></div>
          <div class="dr"><span class="dk">Netto</span><span class="${cc(lev.net||0)}">${s(lev.net||0)}${fmt(lev.net)}</span></div>
        </div>
        <div><h4>Asset Managers</h4>
          <div class="dr"><span class="dk">Long</span><span>${fmt(am.long)}</span></div>
          <div class="dr"><span class="dk">Short</span><span>${fmt(am.short)}</span></div>
          <div class="dr"><span class="dk">Netto</span><span class="${cc(am.net||0)}">${s(am.net||0)}${fmt(am.net)}</span></div>
        </div>
        <div><h4>Dealers / Non-Rept</h4>
          <div class="dr"><span class="dk">Dealer Netto</span><span class="${cc(dl.net||0)}">${s(dl.net||0)}${fmt(dl.net)}</span></div>
          <div class="dr"><span class="dk">NonRept Netto</span><span class="${cc(nr.net||0)}">${s(nr.net||0)}${fmt(nr.net)}</span></div>
        </div>
      </div>
    </td></tr>`;
  }).join('');
}

function tog(i){
  const r=document.getElementById('d'+i);
  const open=r.style.display!=='none';
  document.querySelectorAll('[id^="d"]').forEach(x=>x.style.display='none');
  if(!open)r.style.display='table-row';
}

document.querySelectorAll('.chip').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  filter=b.dataset.f;
  render();
}));

document.getElementById('search').addEventListener('input',e=>{q=e.target.value.toLowerCase();render();});

async function loadData(){
  try{
    const res=await fetch('data/latest.json');
    DATA=await res.json();
    document.getElementById('msg').style.display='none';
    document.getElementById('tbl').style.display='table';
    if(DATA.length>0){
      const d=new Date(DATA[0].date);
      document.getElementById('dato').textContent=d.toLocaleDateString('nb-NO',{day:'numeric',month:'long',year:'numeric'});
    }
    render();
  }catch(e){
    document.getElementById('msg').textContent='⚠️ Kunne ikke laste data/latest.json – sjekk at filen er pushet til GitHub.';
  }
}

loadData();
</script>
</body>
</html>
